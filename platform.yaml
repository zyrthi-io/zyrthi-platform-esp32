platform: esp32
description: Espressif ESP32 系列
vendor: espressif
version: "1.0.0"

# 芯片变体
chips:
  esp32:
    core: xtensa
    flash_size: 4MB
    ram_size: 520KB
    entry_addr: 0x1000
  esp32s2:
    core: xtensa
    flash_size: 4MB
    ram_size: 320KB
    entry_addr: 0x1000
  esp32s3:
    core: xtensa
    flash_size: 8MB
    ram_size: 512KB
    psram: true
    entry_addr: 0x0
  esp32c3:
    core: riscv
    flash_size: 4MB
    ram_size: 400KB
    entry_addr: 0x0
  esp32c6:
    core: riscv
    flash_size: 4MB
    ram_size: 512KB
    entry_addr: 0x0
  esp32h2:
    core: riscv
    flash_size: 4MB
    ram_size: 256KB
    entry_addr: 0x0

# 工具链下载地址（按平台）
toolchain:
  base_url: "https://github.com/zyrthi-io/zyrthi-platform-esp32/releases/download/v1.0.0"
  packages:
    linux-amd64:
      file: "zyrthi-esp32-v1.0.0-linux-amd64.tar.xz"
      size: 342
      checksum: "sha256:xxx"
    # darwin-amd64/darwin-arm64/windows-amd64: 待后续添加

# 适配器下载地址（从完整包中提取）
adapter:
  base_url: "https://github.com/zyrthi-io/zyrthi-platform-esp32/releases/download/v1.0.0"
  file: "adapter.tar.xz"
  size: 1
  checksum: "sha256:xxx"

# 烧录配置
flash:
  default_baud: 115200
  max_baud: 921600