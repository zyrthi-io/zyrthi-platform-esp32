# zyrthi-platform-esp32
# ESP32 系列芯片平台配置

platform: esp32
description: Espressif ESP32 系列
vendor: espressif
version: "1.0.0"

# 容器镜像（替代 WASM 插件）
image: zyrthi/esp32:latest

# 烧录配置
flash:
  default_baud: 115200
  max_baud: 921600

# 芯片变体
chips:
  esp32:
    core: xtensa
    flash_size: 4MB
    ram_size: 520KB
    entry_addr: 0x1000

  esp32s2:
    core: xtensa
    flash_size: 4MB
    ram_size: 320KB
    entry_addr: 0x1000

  esp32s3:
    core: xtensa
    flash_size: 8MB
    ram_size: 512KB
    psram: true
    entry_addr: 0x0

  esp32c3:
    core: riscv
    flash_size: 4MB
    ram_size: 400KB
    entry_addr: 0x0

  esp32c6:
    core: riscv
    flash_size: 4MB
    ram_size: 512KB
    entry_addr: 0x0

  esp32h2:
    core: riscv
    flash_size: 4MB
    ram_size: 256KB
    entry_addr: 0x0